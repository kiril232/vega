name: CI

on:
  push:
    branches: [main]

jobs:
  build-dotnet:
    name: .NET build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Vega.sln

      - name: Build
        run: dotnet build Vega.sln --no-restore -c Release

  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  build-and-push-images:
    name: Docker build and push images
    runs-on: ubuntu-latest
    needs: [build-dotnet, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}  

      - name: Build and push user-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/Vega.UserService
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-user-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-user-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push product-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/Vega.ProductService
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-product-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-product-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cart-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/Vega.CartService
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-cart-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-cart-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push order-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/Vega.OrderService
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-order-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-order-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push payment-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/Vega.PaymentService
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-payment-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-payment-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vega-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout gitops branch
        uses: actions/checkout@v4
        with:
          ref: gitops
          path: gitops

      - name: Sync gitops with main and Update image tags in gitops branch
        run: |
          cp -r k8s/. gitops/k8s/
          sed -i "s|image: .*/vega-user-service:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/vega-user-service:${{ github.sha }}|g" gitops/k8s/user-service.yaml
          sed -i "s|image: .*/vega-product-service:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/vega-product-service:${{ github.sha }}|g" gitops/k8s/product-service.yaml
          sed -i "s|image: .*/vega-cart-service:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/vega-cart-service:${{ github.sha }}|g" gitops/k8s/cart-service.yaml
          sed -i "s|image: .*/vega-order-service:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/vega-order-service:${{ github.sha }}|g" gitops/k8s/order-service.yaml
          sed -i "s|image: .*/vega-payment-service:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/vega-payment-service:${{ github.sha }}|g" gitops/k8s/payment-service.yaml
          sed -i "s|image: .*/vega-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/vega-frontend:${{ github.sha }}|g" gitops/k8s/frontend.yaml

      - name: Commit and push to gitops branch
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/
          git commit -m "Update image tags to ${{ github.sha }}"
          git push
