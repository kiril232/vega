name: CI

on:
  push:
    branches: [main]

jobs:
  build-dotnet:
    name: .NET build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Vega.sln

      - name: Build
        run: dotnet build Vega.sln --no-restore -c Release

  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  build-images:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [build-dotnet, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build user-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/Vega.UserService
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build product-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/Vega.ProductService
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build cart-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/Vega.CartService
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build order-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/Vega.OrderService
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build payment-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/Vega.PaymentService
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
