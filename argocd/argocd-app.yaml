apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vega
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kiril232/vega.git
    targetRevision: gitops
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: vega
  syncPolicy:
    automated:
      prune: true
      selfHeal: true