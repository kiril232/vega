
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vega-ingress
  namespace: vega
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: vega-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: vega.local    
      http:
        paths:
          - path: /users
            pathType: Prefix
            backend:  
              service:
                name: user-service
                port:
                  number: 8080

          - path: /products
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 8080

          - path: /cart
            pathType: Prefix
            backend:
              service:
                name: cart-service
                port:
                  number: 8080

          - path: /orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8080

          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8080

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80