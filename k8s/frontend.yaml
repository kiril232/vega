apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: vega
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: kiril232/vega-frontend:6c4b8962a6e12b433948889c9039cef1a236d7f7
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: vega
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80