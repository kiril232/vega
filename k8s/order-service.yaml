apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: vega
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: kiril232/vega-order-service:b201df970336a4006350525b943c3da57f6a6ac8
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: vega-config
          env:
            - name: ConnectionStrings__Default
              value: "Host=postgres;Port=5432;Database=vega;Username=vega;Password=vega;"
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: vega-secret
                  key: jwt-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: vega
spec:
  selector:
    app: order-service
  ports:
    - port: 8080
      targetPort: 8080